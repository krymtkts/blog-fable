name: Build pages on Pull Request

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build pages
        uses: ./.github/actions/build
        with:
          snyk_token: ${{ secrets.SNYK_TOKEN }}
