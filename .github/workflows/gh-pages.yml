name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build pages
        uses: ./.github/actions/build
        with:
          snyk_token: ${{ secrets.SNYK_TOKEN }}
          snyk_continue_on_error: "true"
      - name: Upload Node.js results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-node.sarif
          category: Snyk Vulnerabilities(Node.js)
      # TODO: Currently, Snyk's .NET action does not work with test project.
      # TODO: Revisit when Snyk provides a supported replacement.
      # - name: Upload .NET results
      #   uses: github/codeql-action/upload-sarif@v4
      #   with:
      #     sarif_file: snyk-dotnet.sarif
      #     category: Snyk Vulnerabilities(.NET)
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/blog-fable/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
