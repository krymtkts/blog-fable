name: "Build pages Action"
description: "Setup .NET and Node.js, install dependencies and build pages."

inputs:
  snyk_token:
    description: "Snyk token"
    required: true
  snyk_continue_on_error:
    description: "Continue when Snyk finds vulnerabilities"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: ./global.json
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ./package.json
    - name: Install dependencies
      shell: bash
      run: npm install
    - name: Build pages
      shell: bash
      run: npm run build
    - name: Check formatting
      shell: bash
      run: dotnet fantomas --check ./src
    - name: Install Playwright
      shell: pwsh
      run: |
        dotnet build ./test/test.fsproj
        ./test/bin/Debug/*/playwright.ps1 install-deps
        ./test/bin/Debug/*/playwright.ps1 install
    - name: Snapshot tests
      shell: bash
      run: dotnet test --nologo --verbosity detailed --blame-hang-timeout 5s --blame-hang-dump-type full
    - name: Run Snyk to check for vulnerabilities (Node.js)
      uses: snyk/actions/node@master
      continue-on-error: ${{ inputs.snyk_continue_on_error == 'true' }}
      env:
        SNYK_TOKEN: ${{ inputs.snyk_token }}
      with:
        command: test
        args: >-
          --file=package.json
          --sarif-file-output=snyk-node.sarif
          --org=krymtkts
